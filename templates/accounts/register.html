{% extends 'base.html' %}

{% block title %}Register User{% endblock %}

{% block content %}

<div class="card shadow border-0">

    <div class="card-header bg-success text-white">

        <h4>
            <i class="fas fa-user-plus"></i>
            Register New User
        </h4>

    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            <div class="row">

                <div class="col-md-6">

                    <label>First Name</label>

                    <input type="text"
                           class="form-control"
                           name="first_name">

                </div>

                <div class="col-md-6">

                    <label>Last Name</label>

                    <input type="text"
                           class="form-control"
                           name="last_name">

                </div>

            </div>

            <br>

            <div class="row">

                <div class="col-md-6">

                    <label>Username</label>

                    <input type="text"
                           class="form-control"
                           name="username">

                </div>

                <div class="col-md-6">

                    <label>Email</label>

                    <input type="email"
                           class="form-control"
                           name="email">

                </div>

            </div>

            <br>

            <div class="row">

                <div class="col-md-6">

                    <label>Password</label>

                    <input type="password"
                           class="form-control"
                           name="password1">

                </div>

                <div class="col-md-6">

                    <label>Confirm Password</label>

                    <input type="password"
                           class="form-control"
                           name="password2">

                </div>

            </div>

            <br>

            <button class="btn btn-success">

                Create User

            </button>

        </form>

    </div>

</div>

{% endblock %}
