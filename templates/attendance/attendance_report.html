{% extends 'base.html' %}

{% block title %}Attendance Report{% endblock %}

{% block content %}

<div class="card shadow border-0">

    <div class="card-header bg-info text-white">

        <h4>
            <i class="fas fa-chart-bar"></i>
            Attendance Report
        </h4>

    </div>

    <div class="card-body">

        <form method="GET">

            <div class="row">

                <div class="col-md-4">

                    <label>From Date</label>

                    <input type="date"
                           name="start_date"
                           class="form-control">

                </div>

                <div class="col-md-4">

                    <label>To Date</label>

                    <input type="date"
                           name="end_date"
                           class="form-control">

                </div>

                <div class="col-md-4">

                    <label>&nbsp;</label>

                    <button class="btn btn-primary w-100">

                        Generate Report

                    </button>

                </div>

            </div>

        </form>

        <hr>

        <div class="row text-center">

            <div class="col-md-4">

                <div class="card bg-success text-white">

                    <div class="card-body">

                        <h2>{{ total_present }}</h2>

                        <h6>Total Present</h6>

                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card bg-danger text-white">

                    <div class="card-body">

                        <h2>{{ total_absent }}</h2>

                        <h6>Total Absent</h6>

                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card bg-primary text-white">

                    <div class="card-body">

                        <h2>{{ attendance_percentage }}%</h2>

                        <h6>Attendance Rate</h6>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
