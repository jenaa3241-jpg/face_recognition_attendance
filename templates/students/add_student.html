<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
        }

        .main-card{
            border:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        .card-header-custom{
            background:linear-gradient(
                    135deg,
                    #0d6efd,
                    #0b5ed7
            );
            color:white;
            padding:25px;
        }

        .section-box{
            background:white;
            padding:25px;
            border-radius:15px;
            margin-bottom:25px;
        }

        .section-title{
            font-weight:700;
            color:#0d6efd;
            margin-bottom:20px;
        }

        .form-control,
        .form-select{
            height:55px;
            border-radius:12px;
        }

        .camera-box{
            background:#fff;
            padding:15px;
            border-radius:15px;
            border:1px solid #ddd;
            box-shadow:0 3px 10px rgba(0,0,0,0.08);
        }

        .camera-title{
            text-align:center;
            font-weight:600;
            margin-bottom:10px;
        }

        #video,
        #canvas{
            width:100%;
            height:350px;
            border-radius:12px;
            border:2px solid #dee2e6;
            object-fit:cover;
        }

        .action-btn{
            min-width:180px;
            height:55px;
            margin:5px;
            border-radius:10px;
            font-weight:600;
        }

        .save-btn{
            width:280px;
            height:60px;
            border-radius:12px;
            font-size:20px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="card main-card">

            <div class="card-header-custom">

                <h2>
                    <i class="fas fa-user-graduate"></i>
                    Student Registration
                </h2>

                <p class="mb-0">
                    Register Student & Capture Face
                </p>

            </div>

            <div class="card-body p-4">

                <!-- Student Information -->

                <div class="section-box">

                    <h4 class="section-title">

                        <i class="fas fa-id-card"></i>
                        Student Information

                    </h4>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Student ID
                            </label>

                            <input type="text"
                                   name="student_id"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Student Name
                            </label>

                            <input type="text"
                                   name="name"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="col-md-3 mb-3">

                            <label class="form-label">
                                Department
                            </label>

                            <select name="department"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Select
                                </option>

                                <option>CSE</option>
                                <option>IT</option>
                                <option>ECE</option>
                                <option>Mechanical</option>
                                <option>Civil</option>

                            </select>

                        </div>

                        <div class="col-md-3 mb-3">

                            <label class="form-label">
                                Course
                            </label>

                            <select name="course"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Select
                                </option>

                                <option>BCA</option>
                                <option>MCA</option>
                                <option>B.Tech</option>
                                <option>M.Tech</option>

                            </select>

                        </div>

                    </div>

                </div>

                <!-- Face Registration -->

                <div class="section-box">

                    <h4 class="section-title">

                        <i class="fas fa-camera"></i>
                        Face Registration

                    </h4>

                    <div class="row">

                        <div class="col-lg-6">

                            <div class="camera-box">

                                <div class="camera-title">
                                    Live Camera
                                </div>

                                <video id="video"
                                       autoplay>
                                </video>

                            </div>

                        </div>

                        <div class="col-lg-6">

                            <div class="camera-box">

                                <div class="camera-title">
                                    Captured Face
                                </div>

                                <canvas id="canvas"></canvas>

                            </div>

                        </div>

                    </div>

                    <div class="text-center mt-4">

                        <button type="button"
                                class="btn btn-success action-btn"
                                onclick="startCamera()">

                            <i class="fas fa-video"></i>
                            Start Camera

                        </button>

                        <button type="button"
                                class="btn btn-primary action-btn"
                                onclick="captureFace()">

                            <i class="fas fa-camera"></i>
                            Capture Face

                        </button>

                        <button type="button"
                                class="btn btn-warning action-btn"
                                onclick="retakeFace()">

                            <i class="fas fa-rotate"></i>
                            Retake

                        </button>

                        <button type="button"
                                class="btn btn-danger action-btn"
                                onclick="stopCamera()">

                            <i class="fas fa-stop"></i>
                            Stop Camera

                        </button>

                    </div>

                    <input type="hidden"
                           name="captured_image"
                           id="captured_image">

                </div>

                <div class="text-center">

                    <button type="submit"
                            class="btn btn-dark save-btn">

                        <i class="fas fa-save"></i>
                        Save Student

                    </button>

                </div>

            </div>

        </div>

    </form>

</div>

<script>

let stream;

async function startCamera(){

    stream = await navigator.mediaDevices.getUserMedia({
        video:true
    });

    document.getElementById('video').srcObject = stream;
}

function captureFace(){

    let video =
        document.getElementById('video');

    let canvas =
        document.getElementById('canvas');

    let ctx =
        canvas.getContext('2d');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(
        video,
        0,
        0
    );

    document.getElementById(
        'captured_image'
    ).value =
    canvas.toDataURL('image/png');
}

function retakeFace(){

    let canvas =
        document.getElementById('canvas');

    let ctx =
        canvas.getContext('2d');

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );
}

function stopCamera(){

    if(stream){

        stream.getTracks().forEach(
            track => track.stop()
        );
    }
}

</script>

</body>
</html>
<script>

let stream;

async function startCamera() {

    try {

        stream = await navigator.mediaDevices.getUserMedia({
            video: true
        });

        document.getElementById('video').srcObject = stream;

    }

    catch(err) {

        alert("Camera Access Denied");

    }
}
</script>
